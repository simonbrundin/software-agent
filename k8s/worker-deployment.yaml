apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
  namespace: agents-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      serviceAccountName: agent-worker-sa
      containers:
        - name: worker
          image: ghcr.io/simonbrundin/agents/worker:latest
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: redis-addr
                  key: addr
            - name: PROVIDER_MANAGER_URL
              value: "http://provider-manager:8080/v1/generate"
