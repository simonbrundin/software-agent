apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agents-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/simonbrundin/agents.git"
    targetRevision: main
    path: k8s/agents-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: agents-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
