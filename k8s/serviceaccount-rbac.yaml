apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-orchestrator-sa
  namespace: agents-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-worker-sa
  namespace: agents-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-orchestrator-role
  namespace: agents-dev
rules:
  - apiGroups: [""]
    resources: ["pods", "jobs", "secrets"]
    verbs: ["get", "list", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-orchestrator-binding
  namespace: agents-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-orchestrator-role
subjects:
  - kind: ServiceAccount
    name: agent-orchestrator-sa
    namespace: agents-dev
